name: Cleanup old prereleases

# Keep the latest few prerelease GitHub releases (and their tags) so the
# releases page doesn't accumulate forever. See RELEASING.md for the beta
# tagging flow.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # Mondays at 06:00 UTC

jobs:
  cleanup:
    name: Delete all prereleases except the latest few
    runs-on: ubuntu-latest
    steps:
      - name: Delete old prereleases
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const versions_to_keep = 3;

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const prereleases = releases
              .filter(r => r.prerelease)
              .sort((a, b) => new Date(b.published_at) - new Date(a.published_at));

            const old = prereleases.slice(versions_to_keep);

            if (old.length === 0) {
              core.info(`No prereleases to delete (have ${prereleases.length}, keeping up to ${versions_to_keep}).`);
              return;
            }

            core.info(`Keeping ${Math.min(versions_to_keep, prereleases.length)} most-recent prerelease(s).`);

            for (const release of old) {
              core.info(`Deleting release: ${release.tag_name}`);

              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
              });

              try {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `tags/${release.tag_name}`,
                });
              } catch (error) {
                if (error.status === 422) {
                  core.info(`Tag ref not found for ${release.tag_name}, skipping.`);
                } else {
                  throw error;
                }
              }
            }

            core.info(`Cleaned up ${old.length} old prerelease(s).`);
