name: Lint PR title

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            refactor
            perf
            test
            ci
            build
            revert
          subjectPattern: ^[a-z].+[^.]$
          subjectPatternError: |
            PR title subject must start lowercase and not end with a period.
            See RELEASING.md for accepted conventional commit prefixes.
