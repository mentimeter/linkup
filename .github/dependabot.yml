version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 5
      semver-major-days: 10
      semver-minor-days: 7
      semver-patch-days: 3
  - package-ecosystem: "npm"
    directory: "/docs"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 5
      semver-major-days: 10
      semver-minor-days: 7
      semver-patch-days: 3
